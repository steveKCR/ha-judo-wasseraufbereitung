blueprint:
  name: JUcontrol Salt Supply Reminder
  description: >
    Sends an immediate alert when the JUcontrol salt range falls to or below the
    configured warning threshold and repeats the reminder daily until the salt
    supply is back above the threshold.
  domain: automation
  author: itsh-neumeier
  homeassistant:
    min_version: 2026.3.0
  input:
    salt_range_entity:
      name: Salt range entity
      description: Sensor that reports the remaining salt range in days.
      selector:
        entity:
          filter:
            - integration: jucontrol_local
              domain: sensor
    salt_warning_entity:
      name: Salt shortage warning entity
      description: >
        Sensor or number that contains the salt shortage warning threshold in days.
      selector:
        entity:
          filter:
            - integration: jucontrol_local
              domain:
                - sensor
                - number
    reminder_time:
      name: Daily reminder time
      description: Time used for the recurring daily reminder while salt is low.
      default: "09:00:00"
      selector:
        time:
    notification_title:
      name: Notification title
      default: JUcontrol salt supply
      selector:
        text:
    notification_intro:
      name: Notification intro text
      description: Short text shown before the automatic day values.
      default: Refill salt.
      selector:
        text:
          multiline: true
    reminder_actions:
      name: Reminder actions
      description: >
        Optional custom actions to run when the reminder fires. If left empty,
        the blueprint creates a persistent notification instead.
      default: []
      selector:
        action:

mode: single

variables:
  salt_range_entity: !input salt_range_entity
  salt_warning_entity: !input salt_warning_entity
  notification_title: !input notification_title
  notification_intro: !input notification_intro
  reminder_actions: !input reminder_actions
  salt_range_value: "{{ states(salt_range_entity) | float(999) }}"
  salt_warning_value: "{{ states(salt_warning_entity) | float(0) }}"
  reminder_message: >-
    {{ notification_intro }}
    Remaining salt range: {{ salt_range_value | round(1) }} days.
    Salt shortage warning threshold: {{ salt_warning_value | round(1) }} days.

triggers:
  - trigger: state
    entity_id:
      - !input salt_range_entity
      - !input salt_warning_entity
  - trigger: time
    at: !input reminder_time

conditions:
  - condition: template
    value_template: "{{ salt_range_value <= salt_warning_value }}"

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ reminder_actions | count > 0 }}"
        sequence: !input reminder_actions
    default:
      - action: persistent_notification.create
        data:
          title: "{{ notification_title }}"
          message: "{{ reminder_message }}"
